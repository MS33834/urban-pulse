name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Run ruff check
        run: ruff check backend/ config/ scripts/ tests/
      - name: Check code format
        run: ruff format --check .

  typecheck:
    name: Type Check
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install runtime + type check tools
        run: |
          pip install --upgrade pip
          pip install -e .[data,forecast,cli,dev]
          pip install -e plugins/urban-pulse-demo
          pip install mypy pandas-stubs types-PyYAML types-reportlab
      - name: Run mypy
        run: mypy backend/ config/ scripts/

  test:
    name: Test
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential gfortran && rm -rf /var/lib/apt/lists/*
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[data,forecast,cli,dev]
          pip install -e plugins/urban-pulse-demo
      - name: Run tests with coverage
        run: |
          pytest -q --tb=short --cov=backend --cov-report=term --cov-fail-under=40

  contract:
    name: API Contract Tests
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[dev]
          pip install -e plugins/urban-pulse-demo
      - name: Run contract tests
        run: pytest tests/backend/test_api_contracts.py -q --tb=short

  e2e:
    name: E2E Browser Tests
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential gfortran && rm -rf /var/lib/apt/lists/*
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[data,forecast,cli,dev]
          pip install -e plugins/urban-pulse-demo
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: Run E2E tests
        run: pytest tests/e2e --e2e -q --tb=short

  security:
    name: Dependency Audit
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install audit tools
        run: |
          pip install --upgrade pip
          pip install pip-audit
      - name: Audit production dependencies
        run: pip-audit -r requirements.txt
      - name: Run custom security audit
        run: python scripts/security_audit.py

  build:
    name: Build Static Site
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[data,forecast,cli,dev]
          pip install -e plugins/urban-pulse-demo
      - name: Build showcase site
        run: python scripts/build_site.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
