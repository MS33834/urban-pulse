name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Run ruff check
        run: ruff check backend/ config/ scripts/ tests/
      - name: Check code format
        run: ruff format --check .

  typecheck:
    name: Type Check
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime + type check tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt mypy
          pip install pandas-stubs types-PyYAML types-reportlab
      - name: Run mypy
        run: mypy backend/ config/ scripts/

  test:
    name: Test
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential gfortran && rm -rf /var/lib/apt/lists/*
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[data,forecast,cli,dev]
          pip install -e plugins/urban-pulse-demo
      - name: Run tests
        run: |
          pytest tests/backend/ -q --tb=short --cov=backend --cov-report=term --cov-fail-under=30

  build:
    name: Build Static Site
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build showcase site
        run: python scripts/build_site.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
