services:
  urban-pulse:
    build: .
    container_name: urban-pulse
    user: "10001:10001"
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - APP_HOST=127.0.0.1
      - APP_PORT=8000
      - APP_RELOAD=false
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
